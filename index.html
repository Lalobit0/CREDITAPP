<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CreditoApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181c;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f2;
  --muted: #7a7a8a;
  --accent: #4f8fff;
  --accent-dim: rgba(79,143,255,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
input, select, button, textarea { font-family: inherit; }

/* CONFIG SCREEN */
#config-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
#config-screen h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
#config-screen p { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
.config-box { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 420px; text-align: left; }
.config-box label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; margin-top: 16px; }
.config-box label:first-child { margin-top: 0; }
.config-box input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace; }
.config-box input:focus { outline: none; border-color: var(--accent); }
.config-box .hint { font-size: 11px; color: var(--muted); margin-top: 20px; line-height: 1.6; }
.config-box .hint a { color: var(--accent); text-decoration: none; }
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px 20px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 20px; transition: opacity .15s; }
.btn-primary:hover { opacity: .85; }
.btn-primary:active { opacity: .7; }

/* LAYOUT */
#app { display: none; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-sub { font-size: 11px; color: var(--muted); }
.logout-btn { font-size: 12px; color: var(--muted); cursor: pointer; background: none; border: none; padding: 4px 8px; }
.logout-btn:hover { color: var(--red); }
.main { flex: 1; padding: 16px; max-width: 520px; margin: 0 auto; width: 100%; padding-bottom: 90px; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 14px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 10px; font-family: inherit; gap: 4px; transition: color .15s; }
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 20px; height: 20px; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.card-sm { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }

/* STATS GRID */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.stat-val { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
.stat-val.green { color: var(--green); }
.stat-val.accent { color: var(--accent); }
.stat-val.amber { color: var(--amber); }
.stat-val.purple { color: var(--purple); }

/* SECTION TITLE */
.section-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin: 20px 0 10px; }

/* FORM */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; }
.form-input:focus { outline: none; border-color: var(--accent); }
.form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 14px; appearance: none; }
.form-select:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { border: 1px solid var(--border2); border-radius: 99px; padding: 5px 14px; font-size: 12px; cursor: pointer; background: none; color: var(--muted); transition: all .15s; }
.chip.sel { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* LIST ITEMS */
.list-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
.list-item:hover { border-color: var(--border2); }
.list-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.list-item-name { font-size: 15px; font-weight: 500; }
.list-item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.list-item-amount { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; }
.badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-accent { background: var(--accent-dim); color: var(--accent); }

/* PROGRESS BAR */
.prog-bar { height: 4px; background: var(--surface2); border-radius: 99px; margin-top: 8px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width .4s; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 36px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 0; }

/* PAYMENT TABLE */
.pay-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pay-table th { text-align: left; color: var(--muted); font-weight: 400; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
.pay-table td { padding: 8px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; }
.pay-table tr:last-child td { border-bottom: none; }
.pay-row-done td { color: var(--muted); text-decoration: line-through; }
.pay-btn { font-size: 11px; padding: 3px 10px; border: 1px solid var(--accent); border-radius: 99px; background: none; color: var(--accent); cursor: pointer; font-family: inherit; }
.pay-btn:hover { background: var(--accent-dim); }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-size: 13px; padding: 10px 20px; border-radius: 99px; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* FAB */
.fab { position: fixed; bottom: 76px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 150; transition: transform .15s; box-shadow: 0 4px 20px rgba(79,143,255,.35); }
.fab:active { transform: scale(.93); }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* DETAIL VIEW */
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; display: flex; }
.detail-name { font-size: 20px; font-weight: 600; }
.detail-phone { font-size: 13px; color: var(--muted); }
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--muted); }
.info-val { font-weight: 500; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<!-- CONFIG -->
 <div id="config-screen">
  <h1>CreditoApp</h1>
  <p>Ingresa tu contraseña para continuar.</p>
  <div class="config-box">
    <label>Contraseña</label>
    <input type="password" id="cfg-pin" placeholder="••••••••" onkeydown="if(event.key==='Enter')conectar()">
    <div id="pin-error" style="color:#f87171;font-size:12px;margin-top:8px;display:none;">Contraseña incorrecta</div>
    <button class="btn-primary" onclick="conectar()">Entrar</button>
  </div>
 </div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">CreditoApp</div>
      <div class="topbar-sub" id="topbar-sub">Dashboard</div>
    </div>
    <button class="logout-btn" onclick="desconectar()">Salir</button>
  </div>
  <div class="main" id="main-content"></div>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navTo('dashboard')" id="nav-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-item" onclick="navTo('clientes')" id="nav-clientes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/><path d="M19 8v6m-3-3h6"/></svg>
      Clientes
    </button>
    <button class="nav-item" onclick="navTo('ventas')" id="nav-ventas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
      Créditos
    </button>
    <button class="nav-item" onclick="navTo('prestamos')" id="nav-prestamos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Préstamos
    </button>
  </nav>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-title">Nuevo cliente <button class="modal-close" onclick="cerrarModal('modal-cliente')">×</button></div>
    <div class="form-group"><label class="form-label">Nombre completo</label><input class="form-input" id="cli-nombre" placeholder="Ej: María López"></div>
    <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="cli-tel" type="tel" placeholder="664 123 4567"></div>
    <div class="form-group"><label class="form-label">Notas (opcional)</label><input class="form-input" id="cli-notas" placeholder="Referencia, dirección..."></div>
    <button class="btn-primary" onclick="guardarCliente()">Guardar cliente</button>
  </div>
</div>

<div class="modal-overlay" id="modal-venta">
  <div class="modal">
    <div class="modal-title">Nueva venta a crédito <button class="modal-close" onclick="cerrarModal('modal-venta')">×</button></div>
    <div class="form-group">
      <label class="form-label">Cliente</label>
      <select class="form-select" id="ven-cliente"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Producto</label>
      <div class="chip-row" id="prod-chips"></div>
    </div>
    <div class="form-group"><label class="form-label">Precio de contado ($)</label><input class="form-input" id="ven-precio" type="number" placeholder="Ej: 14999"></div>
    <div class="form-group"><label class="form-label">Enganche ($) — dejar en 0 si no hay</label><input class="form-input" id="ven-enganche" type="number" value="0"></div>
    <div class="form-group">
      <label class="form-label">Plazo</label>
      <div class="chip-row" id="plazo-chips"></div>
    </div>
    <div class="form-group"><label class="form-label">Tasa de interés (%)</label><input class="form-input" id="ven-tasa" type="number" value="25"></div>
    <div class="card" id="ven-preview" style="margin-bottom:14px; display:none;">
      <div class="info-row"><span class="info-key">Saldo a financiar</span><span class="info-val" id="prev-saldo">—</span></div>
      <div class="info-row"><span class="info-key">Total a pagar</span><span class="info-val" id="prev-total">—</span></div>
      <div class="info-row"><span class="info-key">Tu ganancia</span><span class="info-val" style="color:var(--green)" id="prev-gan">—</span></div>
      <div class="info-row" style="border:none"><span class="info-key">Pago por período</span><span class="info-val" style="color:var(--accent)" id="prev-pago">—</span></div>
    </div>
    <button class="btn-primary" onclick="guardarVenta()">Registrar venta</button>
  </div>
</div>

<div class="modal-overlay" id="modal-prestamo">
  <div class="modal">
    <div class="modal-title">Nuevo préstamo <button class="modal-close" onclick="cerrarModal('modal-prestamo')">×</button></div>
    <div class="form-group">
      <label class="form-label">Cliente</label>
      <select class="form-select" id="pre-cliente"></select>
    </div>
    <div class="form-group"><label class="form-label">Monto del préstamo ($)</label><input class="form-input" id="pre-monto" type="number" placeholder="Ej: 5000"></div>
    <div class="form-group"><label class="form-label">Comisión por cada $1,000 por semana ($)</label><input class="form-input" id="pre-comision" type="number" value="50"></div>
    <div class="form-group"><label class="form-label">Número de semanas</label><input class="form-input" id="pre-semanas" type="number" value="4"></div>
    <div class="card" id="pre-preview" style="margin-bottom:14px; display:none;">
      <div class="info-row"><span class="info-key">Cobro semanal</span><span class="info-val" id="pprev-sem">—</span></div>
      <div class="info-row"><span class="info-key">Total a cobrar</span><span class="info-val" id="pprev-total">—</span></div>
      <div class="info-row" style="border:none"><span class="info-key">Tu ganancia</span><span class="info-val" style="color:var(--green)" id="pprev-gan">—</span></div>
    </div>
    <button class="btn-primary" onclick="guardarPrestamo()">Registrar préstamo</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" id="fab" onclick="fabAction()">+</button>

<script>
const SQL_SETUP = `
-- Ejecuta esto en Supabase → SQL Editor

create table clientes (
  id uuid primary key default gen_random_uuid(),
  nombre text not null,
  telefono text,
  notas text,
  created_at timestamptz default now()
);

create table ventas (
  id uuid primary key default gen_random_uuid(),
  cliente_id uuid references clientes(id),
  producto text,
  precio_contado numeric,
  enganche numeric default 0,
  tasa numeric,
  periodos integer,
  tipo_periodo text,
  pago_por_periodo numeric,
  total_credito numeric,
  ganancia numeric,
  pagos_hechos integer default 0,
  saldo_restante numeric,
  estado text default 'activo',
  created_at timestamptz default now()
);

create table prestamos (
  id uuid primary key default gen_random_uuid(),
  cliente_id uuid references clientes(id),
  monto numeric,
  comision_por_mil numeric,
  semanas integer,
  cobro_semanal numeric,
  total_cobrar numeric,
  ganancia numeric,
  semanas_pagadas integer default 0,
  estado text default 'activo',
  created_at timestamptz default now()
);

create table pagos (
  id uuid primary key default gen_random_uuid(),
  tipo text, -- 'venta' o 'prestamo'
  ref_id uuid,
  periodo integer,
  monto numeric,
  fecha timestamptz default now()
);`;

document.getElementById('sql-block').textContent = SQL_SETUP;

const PRODUCTOS = [
  {n:'iPhone 16 Pro Max',p:14999},{n:'iPhone 16 Pro',p:13499},
  {n:'iPhone 15 Pro Max',p:12500},{n:'iPhone 15 Pro',p:10499},
  {n:'iPhone 14 Pro Max',p:9999},{n:'iPhone 14 Pro',p:8499},
  {n:'iPhone 13 Pro Max',p:8199},
];
const PLAZOS = [
  {l:'4 sem',n:4,t:'semana'},{l:'8 sem',n:8,t:'semana'},
  {l:'12 sem',n:12,t:'semana'},{l:'3 meses',n:3,t:'mes'},
  {l:'6 meses',n:6,t:'mes'},
];

let sb = null;
let currentView = 'dashboard';
let selProd = null, selPlazo = null;
let clientes = [], ventas = [], prestamos_data = [];
let detailStack = [];

function fmt(n) { return '$' + Math.round(n||0).toLocaleString('es-MX'); }
function fmtDate(d) { return new Date(d).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }

// CONFIG
const SB_URL = 'https://ivpxysaqjuwfpwexurfj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2cHh5c2FxanV3ZnB3ZXh1cmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzg2MTksImV4cCI6MjA5MDY1NDYxOX0.U6WdqD_OCdAWGaN4lR3TlEYHCO3AxTQDk-wtRSdW3WY';
const APP_PASS = 'Karina.2025';

function conectar() {
  const pin = document.getElementById('cfg-pin').value;
  if (pin !== APP_PASS) {
    document.getElementById('pin-error').style.display = 'block';
    return;
  }
  sb = supabase.createClient(SB_URL, SB_KEY);
  localStorage.setItem('autenticado', '1');
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  cargarTodo();
}

function desconectar() {
  localStorage.removeItem('autenticado');
  location.reload();
}


async function cargarTodo() {
  const [c, v, p] = await Promise.all([
    sb.from('clientes').select('*').order('created_at', {ascending:false}),
    sb.from('ventas').select('*, clientes(nombre)').order('created_at', {ascending:false}),
    sb.from('prestamos').select('*, clientes(nombre)').order('created_at', {ascending:false}),
  ]);
  clientes = c.data || [];
  ventas = v.data || [];
  prestamos_data = p.data || [];
  renderView();
}

// NAV
function navTo(v) {
  currentView = v; detailStack = [];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-'+v)?.classList.add('active');
  document.getElementById('topbar-sub').textContent = {dashboard:'Resumen',clientes:'Clientes',ventas:'Ventas a crédito',prestamos:'Préstamos en efectivo'}[v];
  document.getElementById('fab').style.display = ['clientes','ventas','prestamos'].includes(v) ? 'flex' : 'none';
  renderView();
}

function fabAction() {
  if (currentView === 'clientes') abrirModal('modal-cliente');
  else if (currentView === 'ventas') abrirModalVenta();
  else if (currentView === 'prestamos') abrirModalPrestamo();
}

function renderView() {
  const el = document.getElementById('main-content');
  if (currentView === 'dashboard') { el.innerHTML = renderDashboard(); document.getElementById('fab').style.display='none'; }
  else if (currentView === 'clientes') el.innerHTML = renderClientes();
  else if (currentView === 'ventas') el.innerHTML = renderVentas();
  else if (currentView === 'prestamos') el.innerHTML = renderPrestamos();
}

// DASHBOARD
function renderDashboard() {
  const totalVentas = ventas.reduce((s,v) => s + (v.total_credito||0), 0);
  const ganVentas = ventas.reduce((s,v) => s + (v.ganancia||0), 0);
  const totalPre = prestamos_data.reduce((s,p) => s + (p.monto||0), 0);
  const ganPre = prestamos_data.reduce((s,p) => s + (p.ganancia||0), 0);
  const actVentas = ventas.filter(v=>v.estado==='activo').length;
  const actPre = prestamos_data.filter(p=>p.estado==='activo').length;
  const pendiente = ventas.filter(v=>v.estado==='activo').reduce((s,v)=>s+(v.saldo_restante||0),0)
    + prestamos_data.filter(p=>p.estado==='activo').reduce((s,p)=>s+(p.cobro_semanal||0)*(p.semanas-(p.semanas_pagadas||0)),0);

  return `
    <div class="section-title">Resumen general</div>
    <div class="stats-grid">

// GUARDAR CLIENTE
async function guardarCliente() {
  const nombre = document.getElementById('cli-nombre').value.trim();
  const telefono = document.getElementById('cli-tel').value.trim();
  const notas = document.getElementById('cli-notas').value.trim();
  if (!nombre) { toast('Ingresa el nombre'); return; }
  const {error} = await sb.from('clientes').insert({nombre,telefono,notas});
  if (error) { toast('Error al guardar'); return; }
  toast('Cliente guardado');
  cerrarModal('modal-cliente');
  ['cli-nombre','cli-tel','cli-notas'].forEach(id=>document.getElementById(id).value='');
  await cargarTodo();
}

// MODAL VENTA
function abrirModalVenta() {
  const sel = document.getElementById('ven-cliente');
  sel.innerHTML = clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  const chips = document.getElementById('prod-chips');
  chips.innerHTML = PRODUCTOS.map((p,i)=>`<button class="chip ${i===0?'sel':''}" onclick="selProdClick(this,${i})">${p.n}</button>`).join('');
  selProd = 0;
  const pchips = document.getElementById('plazo-chips');
  pchips.innerHTML = PLAZOS.map((p,i)=>`<button class="chip ${i===0?'sel':''}" onclick="selPlazoClick(this,${i})">${p.l}</button>`).join('');
  selPlazo = 0;
  document.getElementById('ven-precio').value = PRODUCTOS[0].p;
  document.getElementById('ven-enganche').value = 0;
  document.getElementById('ven-tasa').value = 25;
  actualizarPreviewVenta();
  ['ven-precio','ven-enganche','ven-tasa'].forEach(id => document.getElementById(id).oninput = actualizarPreviewVenta);
  abrirModal('modal-venta');
}

function selProdClick(el, i) {
  document.querySelectorAll('#prod-chips .chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel'); selProd = i;
  document.getElementById('ven-precio').value = PRODUCTOS[i].p;
  actualizarPreviewVenta();
}

function selPlazoClick(el, i) {
  document.querySelectorAll('#plazo-chips .chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel'); selPlazo = i;
  actualizarPreviewVenta();
}

function actualizarPreviewVenta() {
  const precio = parseFloat(document.getElementById('ven-precio').value)||0;
  const eng = parseFloat(document.getElementById('ven-enganche').value)||0;
  const tasa = parseFloat(document.getElementById('ven-tasa').value)||0;
  const plazo = PLAZOS[selPlazo||0];
  const saldo = Math.max(0, precio - eng);
  const interes = Math.round(saldo * tasa / 100);
  const totalFin = saldo + interes;
  const totalCliente = eng + totalFin;
  const gan = totalCliente - precio;
  const pago = totalFin / plazo.n;
  document.getElementById('prev-saldo').textContent = fmt(saldo);
  document.getElementById('prev-total').textContent = fmt(totalCliente);
  document.getElementById('prev-gan').textContent = fmt(gan);
  document.getElementById('prev-pago').textContent = fmt(pago)+'/'+plazo.t;
  document.getElementById('ven-preview').style.display = precio>0?'block':'none';
}

async function guardarVenta() {
  const cliente_id = document.getElementById('ven-cliente').value;
  const precio_contado = parseFloat(document.getElementById('ven-precio').value)||0;
  const enganche = parseFloat(document.getElementById('ven-enganche').value)||0;
  const tasa = parseFloat(document.getElementById('ven-tasa').value)||0;
  const plazo = PLAZOS[selPlazo||0];
  const producto = PRODUCTOS[selProd||0].n;
  if (!cliente_id||!precio_contado) { toast('Completa los campos'); return; }
  const saldo = precio_contado - enganche;
  const interes = Math.round(saldo * tasa / 100);
  const totalFin = saldo + interes;
  const totalCliente = enganche + totalFin;
  const ganancia = totalCliente - precio_contado;
  const pago_por_periodo = totalFin / plazo.n;
  const {error} = await sb.from('ventas').insert({
    cliente_id, producto, precio_contado, enganche, tasa,
    periodos: plazo.n, tipo_periodo: plazo.t,
    pago_por_periodo: Math.round(pago_por_periodo),
    total_credito: Math.round(totalCliente),
    ganancia: Math.round(ganancia),
    pagos_hechos: 0,
    saldo_restante: Math.round(totalFin),
    estado: 'activo'
  });
  if (error) { toast('Error al guardar'); console.error(error); return; }
  toast('Venta registrada');
  cerrarModal('modal-venta');
  await cargarTodo();
}

// MODAL PRESTAMO
function abrirModalPrestamo() {
  const sel = document.getElementById('pre-cliente');
  sel.innerHTML = clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  ['pre-monto','pre-comision','pre-semanas'].forEach(id => document.getElementById(id).oninput = actualizarPreviewPrestamo);
  document.getElementById('pre-monto').value = '';
  document.getElementById('pre-comision').value = 50;
  document.getElementById('pre-semanas').value = 4;
  abrirModal('modal-prestamo');
}

function actualizarPreviewPrestamo() {
  const monto = parseFloat(document.getElementById('pre-monto').value)||0;
  const com = parseFloat(document.getElementById('pre-comision').value)||0;
  const sem = parseInt(document.getElementById('pre-semanas').value)||0;
  if (!monto) { document.getElementById('pre-preview').style.display='none'; return; }
  const cobSem = (monto/1000)*com;
  const total = cobSem * sem;
  document.getElementById('pprev-sem').textContent = fmt(cobSem);
  document.getElementById('pprev-total').textContent = fmt(monto+total);
  document.getElementById('pprev-gan').textContent = fmt(total);
  document.getElementById('pre-preview').style.display='block';
}

async function guardarPrestamo() {
  const cliente_id = document.getElementById('pre-cliente').value;
  const monto = parseFloat(document.getElementById('pre-monto').value)||0;
  const comision_por_mil = parseFloat(document.getElementById('pre-comision').value)||0;
  const semanas = parseInt(document.getElementById('pre-semanas').value)||0;
  if (!cliente_id||!monto||!semanas) { toast('Completa los campos'); return; }
  const cobro_semanal = Math.round((monto/1000)*comision_por_mil);
  const ganancia = cobro_semanal * semanas;
  const total_cobrar = monto + ganancia;
  const {error} = await sb.from('prestamos').insert({
    cliente_id, monto, comision_por_mil, semanas,
    cobro_semanal, total_cobrar, ganancia,
    semanas_pagadas: 0, estado: 'activo'
  });
  if (error) { toast('Error al guardar'); console.error(error); return; }
  toast('Préstamo registrado');
  cerrarModal('modal-prestamo');
  await cargarTodo();
}

// PAGOS
async function registrarPagoVenta(id, periodo) {
  const v = ventas.find(x=>x.id===id);
  const nuevosPagos = periodo;
  const nuevoSaldo = Math.max(0, v.saldo_restante - (v.pago_por_periodo * (nuevosPagos - (v.pagos_hechos||0))));
  const nuevoEstado = nuevosPagos >= v.periodos ? 'liquidado' : 'activo';
  await sb.from('ventas').update({pagos_hechos:nuevosPagos, saldo_restante:Math.round(nuevoSaldo), estado:nuevoEstado}).eq('id',id);
  await sb.from('pagos').insert({tipo:'venta', ref_id:id, periodo, monto:v.pago_por_periodo});
  toast('Pago registrado');
  await cargarTodo();
  verVenta(id);
}

async function registrarPagoPrestamo(id, semana) {
  const p = prestamos_data.find(x=>x.id===id);
  const nuevoEstado = semana >= p.semanas ? 'liquidado' : 'activo';
  await sb.from('prestamos').update({semanas_pagadas:semana, estado:nuevoEstado}).eq('id',id);
  await sb.from('pagos').insert({tipo:'prestamo', ref_id:id, periodo:semana, monto:p.cobro_semanal});
  toast('Pago registrado');
  await cargarTodo();
  verPrestamo(id);
}

async function liquidar(tipo, id) {
  if (!confirm('¿Marcar como liquidado?')) return;
  const tabla = tipo==='venta'?'ventas':'prestamos';
  await sb.from(tabla).update({estado:'liquidado'}).eq('id',id);
  toast('Marcado como liquidado');
  await cargarTodo();
  navTo(tipo==='venta'?'ventas':'prestamos');
}

// UTILS
function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function cerrarModal(id) { document.getElementById(id).classList.remove('open'); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

// CERRAR MODALES AL TOCAR OVERLAY
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// AUTO CONECTAR
window.addEventListener('load', () => {
  if (localStorage.getItem('autenticado') === '1') {
    sb = supabase.createClient(SB_URL, SB_KEY);
    document.getElementById('config-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    cargarTodo();
  }
});
</script>
